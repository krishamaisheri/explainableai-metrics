<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explainability Metrics — Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-card: #1c2128;
            --bg-code: #0d1117;
            --border: #30363d;
            --border-highlight: #58a6ff33;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent-cyan: #58a6ff;
            --accent-green: #3fb950;
            --accent-yellow: #d29922;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --accent-magenta: #f778ba;
            --accent-orange: #f0883e;
            --gradient-start: #58a6ff;
            --gradient-end: #bc8cff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo { font-size: 24px; }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            gap: 20px;
        }

        /* Input area */
        .input-area {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            padding: 12px 16px;
            resize: none;
            min-height: 48px;
            max-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area textarea:focus { border-color: var(--accent-cyan); }

        .input-area button {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-family: inherit;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .input-area button:hover { opacity: 0.9; }
        .input-area button:active { transform: scale(0.97); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        .results { display: flex; flex-direction: column; gap: 16px; }

        /* Loading */
        .loading { text-align: center; padding: 48px; color: var(--text-secondary); }

        .loading .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-box {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--accent-red);
            border-radius: 8px;
            padding: 16px;
            color: var(--accent-red);
        }

        /* Result card */
        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header .icon { font-size: 18px; }
        .card-header .title { font-weight: 600; font-size: 14px; }
        .card-body { padding: 20px; }

        .query-display {
            color: var(--accent-cyan);
            font-weight: 500;
            font-size: 15px;
            line-height: 1.5;
        }

        .explanation-text {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 14px;
            white-space: pre-wrap;
        }

        /* Aggregate score */
        .agg-score-container {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 8px 0;
        }

        .agg-score-number {
            font-size: 48px;
            font-weight: 700;
            min-width: 120px;
            text-align: center;
        }

        .agg-score-bar {
            flex: 1; height: 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            overflow: hidden;
        }

        .agg-score-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.6s ease;
        }

        .agg-score-label {
            font-weight: 600;
            font-size: 14px;
            min-width: 120px;
            text-align: right;
        }

        /* Metric rows */
        .metric-row {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            gap: 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.15s;
        }

        .metric-row:hover { background: rgba(255,255,255,0.02); }
        .metric-row:last-of-type { border-bottom: none; }

        .metric-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--accent-cyan);
            min-width: 60px;
        }

        .metric-score {
            font-weight: 500;
            font-size: 13px;
            min-width: 55px;
            text-align: right;
        }

        .metric-bar-wrap {
            flex: 1; height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            overflow: hidden;
        }

        .metric-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .metric-time {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 50px;
            text-align: right;
        }

        .metric-calls {
            font-size: 12px;
            color: var(--text-muted);
            min-width: 60px;
            text-align: right;
        }

        /* Accordion */
        .accordion-arrow {
            transition: transform 0.3s;
            font-size: 12px;
            color: var(--text-muted);
        }

        .accordion-arrow.open { transform: rotate(90deg); }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .accordion-content.open {
            max-height: 5000px;
        }

        /* Detail panels */
        .detail-panel {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin: 8px 12px 12px;
            overflow: hidden;
        }

        .detail-section {
            border-bottom: 1px solid var(--border);
            padding: 0;
        }

        .detail-section:last-child { border-bottom: none; }

        .detail-section-header {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-purple);
            background: rgba(188, 140, 255, 0.05);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-section-header:hover { background: rgba(188, 140, 255, 0.08); }
        .detail-section-body { padding: 12px 16px; }

        /* Formula */
        .formula-box {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }

        .computation-box {
            background: var(--bg-code);
            border: 1px solid rgba(63, 185, 80, 0.2);
            border-radius: 6px;
            padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-green);
        }

        /* Key-value pairs */
        .kv-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
        }

        .kv-row:last-child { border-bottom: none; }
        .kv-label { color: var(--text-muted); }
        .kv-value { color: var(--text-primary); text-align: right; max-width: 60%; word-break: break-word; }

        /* Tags */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin: 2px;
        }

        .tag-green { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); }
        .tag-red { background: rgba(248, 81, 73, 0.15); color: var(--accent-red); }
        .tag-cyan { background: rgba(88, 166, 255, 0.15); color: var(--accent-cyan); }
        .tag-yellow { background: rgba(210, 153, 34, 0.15); color: var(--accent-yellow); }
        .tag-purple { background: rgba(188, 140, 255, 0.15); color: var(--accent-purple); }

        /* LLM Call logs */
        .llm-call-card {
            background: var(--bg-code);
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .llm-call-header {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: rgba(88, 166, 255, 0.05);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .llm-call-header:hover { background: rgba(88, 166, 255, 0.08); }

        .llm-call-badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-cyan);
        }

        .llm-call-time {
            margin-left: auto;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .llm-call-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .llm-call-body.open { max-height: 2000px; }

        .llm-io {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }

        .llm-io:last-child { border-bottom: none; }

        .llm-io-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .llm-io-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Pair check table */
        .check-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .check-table th {
            text-align: left;
            padding: 6px 8px;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
            font-weight: 500;
        }

        .check-table td {
            padding: 6px 8px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
            color: var(--text-secondary);
            vertical-align: top;
        }

        .check-table tr:last-child td { border-bottom: none; }

        /* Alert items */
        .alert-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .alert-red { background: rgba(248, 81, 73, 0.1); border-left: 3px solid var(--accent-red); }
        .alert-amber { background: rgba(210, 153, 34, 0.1); border-left: 3px solid var(--accent-yellow); }

        /* Stat grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: var(--bg-tertiary);
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-value { font-size: 28px; font-weight: 700; color: var(--accent-cyan); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* Empty state */
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state .title { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text-secondary); }

        /* Score colors */
        .score-green { color: var(--accent-green); }
        .score-yellow { color: var(--accent-yellow); }
        .score-red { color: var(--accent-red); }

        .fill-green { background: linear-gradient(90deg, var(--accent-green), #2ea043); }
        .fill-yellow { background: linear-gradient(90deg, var(--accent-yellow), #bb8009); }
        .fill-red { background: linear-gradient(90deg, var(--accent-red), #da3633); }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-tertiary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-logo">⚡</span>
        <h1>Explainability Metrics Chatbot</h1>
        <span class="subtitle">UK Public Sector AI Governance</span>
    </div>

    <div class="container">
        <div class="input-area">
            <textarea id="queryInput" placeholder="Enter your query... e.g. 'Am I eligible for council housing?'" rows="2"></textarea>
            <button id="submitBtn" onclick="submitQuery()">Evaluate</button>
        </div>

        <div class="results" id="resultsArea">
            <div class="empty-state">
                <div class="icon">🔍</div>
                <div class="title">Enter a query to get started</div>
                <div>The pipeline will generate an explanation and compute 8 explainability metrics</div>
            </div>
        </div>
    </div>

    <script>
        const queryInput = document.getElementById('queryInput');
        const submitBtn = document.getElementById('submitBtn');
        const resultsArea = document.getElementById('resultsArea');

        let _toggleId = 0;
        function uid() { return 'uid_' + (++_toggleId); }

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitQuery();
            }
        });

        function scoreColor(s) { return s >= 0.9 ? 'green' : s >= 0.7 ? 'yellow' : 'red'; }
        function scoreLabel(s) { return s >= 0.9 ? 'Excellent' : s >= 0.7 ? 'Acceptable' : s >= 0.5 ? 'Needs Improvement' : 'Poor'; }
        function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        async function submitQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Evaluating...';

            resultsArea.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Running pipeline... this may take a minute</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:8px">
                        Generating explanation → Computing 8 metrics → Aggregating
                    </div>
                </div>`;

            try {
                const resp = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Pipeline failed');
                }

                const result = await resp.json();
                renderResult(result);
            } catch (err) {
                resultsArea.innerHTML = `<div class="error-box"><strong>Error:</strong> ${esc(err.message)}</div>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Evaluate';
            }
        }

        function renderResult(r) {
            const metricOrder = ['IACS', 'ICR', 'IRCS', 'EDAS', 'SECS', 'PGSS', 'ESI', 'EDR'];
            const metricNames = {
                'IACS': 'Input Attribution Consistency Score',
                'ICR': 'Input Contradiction Rate',
                'IRCS': 'Internal Reasoning Consistency Score',
                'EDAS': 'Explanation-Decision Alignment Score',
                'SECS': 'Structured Explanation Completeness Score',
                'PGSS': 'Policy Grounding Similarity Score',
                'ESI': 'Explanation Stability Index',
                'EDR': 'Explanation Density Ratio'
            };

            const aggColor = scoreColor(r.aggregate_score);
            const aggLabel = scoreLabel(r.aggregate_score);

            // Build metrics HTML
            let metricsHTML = '';
            for (const name of metricOrder) {
                const score = r.metric_scores?.[name] ?? 0;
                const time = r.metric_timings?.[name] ?? 0;
                const stat = r.llm_stats?.[name] || {};
                const calls = stat.total_calls || 0;
                const failed = r.metric_failures?.[name];
                const color = scoreColor(score);
                const trace = r.metric_traces?.[name] || {};
                const llmCalls = r.metric_llm_calls?.[name] || [];
                const mid = uid();

                metricsHTML += `
                    <div class="metric-row" onclick="toggleAccordion('${mid}')">
                        <span class="accordion-arrow" id="${mid}-arrow">▶</span>
                        <span class="metric-name">${name}</span>
                        <span class="metric-score score-${color}">${score.toFixed(4)}</span>
                        <div class="metric-bar-wrap">
                            <div class="metric-bar-fill fill-${color}" style="width:${score * 100}%"></div>
                        </div>
                        <span class="metric-time">${time.toFixed(1)}s</span>
                        <span class="metric-calls">${calls} calls</span>
                    </div>
                    <div class="accordion-content" id="${mid}">
                        <div class="detail-panel">
                            ${renderMetricDetail(name, metricNames[name], score, time, stat, failed, trace, llmCalls)}
                        </div>
                    </div>`;
            }

            // Alerts
            let alertsHTML = '';
            if (r.alerts && r.alerts.length > 0) {
                alertsHTML = r.alerts.map(a => {
                    const cls = a.severity === 'Red' ? 'alert-red' : 'alert-amber';
                    const icon = a.severity === 'Red' ? '🔴' : '🟡';
                    return `<div class="alert-item ${cls}">${icon} <strong>${a.metric}</strong> — Score: ${a.score.toFixed(4)} (green ≥ ${a.threshold_green}, amber ≥ ${a.threshold_amber})</div>`;
                }).join('');
            } else {
                alertsHTML = '<div style="color:var(--accent-green)">✓ All metrics within thresholds</div>';
            }

            const g = r.llm_global || {};

            resultsArea.innerHTML = `
                <div class="result-card">
                    <div class="card-header"><span class="icon">💬</span><span class="title">Query</span></div>
                    <div class="card-body"><div class="query-display">${esc(r.query)}</div></div>
                </div>

                <div class="result-card">
                    <div class="card-header"><span class="icon">🤖</span><span class="title">LLM Response</span></div>
                    <div class="card-body"><div class="explanation-text">${esc(r.explanation || '')}</div></div>
                </div>

                <div class="result-card">
                    <div class="card-header"><span class="icon">📊</span><span class="title">Aggregate Score</span></div>
                    <div class="card-body">
                        <div class="agg-score-container">
                            <div class="agg-score-number score-${aggColor}">${r.aggregate_score.toFixed(4)}</div>
                            <div class="agg-score-bar"><div class="agg-score-fill fill-${aggColor}" style="width:${r.aggregate_score * 100}%"></div></div>
                            <div class="agg-score-label score-${aggColor}">${aggLabel}</div>
                        </div>
                    </div>
                </div>

                <div class="result-card">
                    <div class="card-header">
                        <span class="icon">📏</span>
                        <span class="title">Metric Scores</span>
                        <span style="margin-left:auto;font-size:12px;color:var(--text-muted)">Click any metric to see full breakdown</span>
                    </div>
                    <div class="card-body">${metricsHTML}</div>
                </div>

                <div class="result-card">
                    <div class="card-header"><span class="icon">⚠️</span><span class="title">Alerts</span></div>
                    <div class="card-body">${alertsHTML}</div>
                </div>

                <div class="result-card">
                    <div class="card-header"><span class="icon">⚡</span><span class="title">LLM Call Summary</span></div>
                    <div class="card-body">
                        <div class="stat-grid">
                            <div class="stat-card"><div class="stat-value">${g.total_calls||0}</div><div class="stat-label">Total LLM Calls</div></div>
                            <div class="stat-card"><div class="stat-value" style="color:var(--accent-green)">${g.successful||0}</div><div class="stat-label">Successful</div></div>
                            <div class="stat-card"><div class="stat-value" style="color:${g.failed>0?'var(--accent-red)':'var(--accent-green)'}">${g.failed||0}</div><div class="stat-label">Failed</div></div>
                            <div class="stat-card"><div class="stat-value">${(g.total_time||0).toFixed(1)}s</div><div class="stat-label">Total LLM Time</div></div>
                        </div>
                    </div>
                </div>`;
        }

        // ── Render detailed metric breakdown ────────────────────
        function renderMetricDetail(name, fullName, score, time, stat, failed, trace, llmCalls) {
            let html = '';

            // Section 1: Overview
            html += `<div class="detail-section">
                <div class="detail-section-body">
                    <div class="kv-row"><span class="kv-label">Full Name</span><span class="kv-value">${fullName}</span></div>
                    <div class="kv-row"><span class="kv-label">Score</span><span class="kv-value score-${scoreColor(score)}">${score.toFixed(4)}</span></div>
                    <div class="kv-row"><span class="kv-label">Time</span><span class="kv-value">${time.toFixed(3)}s</span></div>
                    <div class="kv-row"><span class="kv-label">LLM Calls</span><span class="kv-value">${stat.total_calls||0} (${stat.successful||0} ok, ${stat.failed||0} failed)</span></div>
                    <div class="kv-row"><span class="kv-label">Model(s)</span><span class="kv-value">${(stat.models_used||[]).join(', ')||'-'}</span></div>
                    <div class="kv-row"><span class="kv-label">Status</span><span class="kv-value">${failed ? '<span class="score-red">✗ Failed: '+esc(failed)+'</span>' : '<span class="score-green">✓ OK</span>'}</span></div>
                </div>
            </div>`;

            // Section 2: Mathematical Computation
            if (trace && Object.keys(trace).length > 0) {
                html += renderTraceSection(name, trace);
            }

            // Section 3: LLM Call Logs
            if (llmCalls && llmCalls.length > 0) {
                html += renderLLMCallsSection(llmCalls);
            }

            return html;
        }

        // ── Render trace/math section ───────────────────────────
        function renderTraceSection(name, trace) {
            let body = '';

            // Formula
            if (trace.formula) {
                body += `<div class="formula-box">📐 ${esc(trace.formula)}</div>`;
            }

            // Note
            if (trace.note) {
                body += `<div style="color:var(--accent-yellow);font-size:13px;margin-bottom:8px">⚠ ${esc(trace.note)}</div>`;
            }

            // Metric-specific rendering
            if (name === 'IACS') {
                body += renderIACSTrace(trace);
            } else if (name === 'ICR') {
                body += renderICRTrace(trace);
            } else if (name === 'IRCS') {
                body += renderIRCSTrace(trace);
            } else if (name === 'EDAS') {
                body += renderEDASTrace(trace);
            } else if (name === 'SECS') {
                body += renderSECSTrace(trace);
            } else if (name === 'PGSS') {
                body += renderPGSSTrace(trace);
            } else if (name === 'ESI') {
                body += renderESITrace(trace);
            } else if (name === 'EDR') {
                body += renderEDRTrace(trace);
            }

            // Final computation
            if (trace.computation) {
                body += `<div class="computation-box" style="margin-top:8px">= ${esc(trace.computation)}</div>`;
            }

            const secId = uid();
            return `<div class="detail-section">
                <div class="detail-section-header" onclick="toggleAccordion('${secId}')">
                    <span class="accordion-arrow" id="${secId}-arrow">▶</span>
                    📐 Mathematical Computation
                </div>
                <div class="accordion-content" id="${secId}">
                    <div class="detail-section-body">${body}</div>
                </div>
            </div>`;
        }

        function renderIACSTrace(t) {
            let h = '';
            if (t.query_attributes) {
                h += `<div style="margin-bottom:8px"><span class="kv-label">Query Attributes (A_Q):</span><br>`;
                h += t.query_attributes.map(a => `<span class="tag tag-cyan">${esc(a)}</span>`).join('');
                h += `</div>`;
            }
            if (t.explanation_attributes) {
                h += `<div style="margin-bottom:8px"><span class="kv-label">Explanation Attributes (A_E):</span><br>`;
                h += t.explanation_attributes.map(a => {
                    const inOverlap = (t.overlap || []).includes(a);
                    return `<span class="tag ${inOverlap ? 'tag-green' : 'tag-yellow'}">${esc(a)}</span>`;
                }).join('');
                h += `</div>`;
            }
            if (t.overlap) {
                h += `<div style="margin-bottom:8px"><span class="kv-label">Overlap (A_E ∩ A_Q):</span><br>`;
                h += t.overlap.map(a => `<span class="tag tag-green">✓ ${esc(a)}</span>`).join('');
                if (t.overlap.length === 0) h += `<span style="color:var(--accent-red);font-size:12px">No overlap</span>`;
                h += `</div>`;
            }
            return h;
        }

        function renderICRTrace(t) {
            let h = '';
            if (t.fact_checks && t.fact_checks.length > 0) {
                h += `<table class="check-table"><tr><th>Fact</th><th>Contradicts?</th></tr>`;
                for (const fc of t.fact_checks) {
                    const cls = fc.contradicts ? 'tag-red' : 'tag-green';
                    const label = fc.contradicts ? '✗ Yes' : '✓ No';
                    h += `<tr><td>${esc(fc.fact)}</td><td><span class="tag ${cls}">${label}</span></td></tr>`;
                }
                h += `</table>`;
                h += `<div class="kv-row" style="margin-top:8px"><span class="kv-label">Contradictions Found</span><span class="kv-value">${t.contradictions} / ${t.total_facts}</span></div>`;
            }
            return h;
        }

        function renderIRCSTrace(t) {
            let h = '';
            if (t.clauses && t.clauses.length > 0) {
                h += `<div style="margin-bottom:8px"><span class="kv-label">Extracted Clauses (${t.num_clauses}):</span></div>`;
                h += `<ol style="padding-left:20px;font-size:12px;color:var(--text-secondary);margin-bottom:12px">`;
                for (const c of t.clauses) {
                    h += `<li style="margin-bottom:4px">${esc(c.substring(0, 120))}</li>`;
                }
                h += `</ol>`;
            }
            if (t.pair_checks && t.pair_checks.length > 0) {
                const limited = t.pair_checks.slice(0, 20); // limit to 20 for display
                h += `<div style="margin-bottom:4px"><span class="kv-label">Pair Contradiction Checks (showing ${limited.length}/${t.pair_checks.length}):</span></div>`;
                h += `<table class="check-table"><tr><th>Statement A</th><th>Statement B</th><th>Contradicts?</th></tr>`;
                for (const pc of limited) {
                    const cls = pc.contradicts ? 'tag-red' : 'tag-green';
                    const label = pc.contradicts ? '✗ Yes' : '✓ No';
                    h += `<tr><td style="max-width:200px">${esc(pc.clause_a)}</td><td style="max-width:200px">${esc(pc.clause_b)}</td><td><span class="tag ${cls}">${label}</span></td></tr>`;
                }
                h += `</table>`;
                h += `<div class="kv-row" style="margin-top:8px"><span class="kv-label">Contradictory Pairs (T)</span><span class="kv-value">${t.contradictory_pairs}</span></div>`;
                h += `<div class="kv-row"><span class="kv-label">Total Pairs (P = k(k−1)/2)</span><span class="kv-value">${t.total_pairs}</span></div>`;
            }
            return h;
        }

        function renderEDASTrace(t) {
            let h = '';
            if (t.extracted_reasoning) {
                h += `<div class="kv-row"><span class="kv-label">Extracted Reasoning</span></div>`;
                h += `<div style="font-size:12px;color:var(--text-secondary);padding:6px 0;border-bottom:1px solid rgba(48,54,61,0.3)">${esc(t.extracted_reasoning)}</div>`;
            }
            if (t.extracted_decision) {
                h += `<div class="kv-row"><span class="kv-label">Extracted Decision</span></div>`;
                h += `<div style="font-size:12px;color:var(--text-secondary);padding:6px 0;border-bottom:1px solid rgba(48,54,61,0.3)">${esc(t.extracted_decision)}</div>`;
            }
            h += `<div class="kv-row"><span class="kv-label">Entailment Score</span><span class="kv-value score-${scoreColor(t.entailment_score||0)}">${(t.entailment_score||0).toFixed(4)}</span></div>`;
            return h;
        }

        function renderSECSTrace(t) {
            let h = '';
            if (t.component_results) {
                h += `<div style="margin-bottom:8px"><span class="kv-label">Component Detection:</span></div>`;
                const labels = {
                    'user_factors': '👤 User Factors',
                    'policy_rule': '📜 Policy Rule',
                    'logical_application': '🔗 Logical Application',
                    'decision_link': '✅ Decision Link'
                };
                for (const [k, v] of Object.entries(t.component_results)) {
                    const cls = v ? 'tag-green' : 'tag-red';
                    const icon = v ? '✓ Present' : '✗ Missing';
                    h += `<div class="kv-row"><span class="kv-label">${labels[k] || k}</span><span class="kv-value"><span class="tag ${cls}">${icon}</span></span></div>`;
                }
                h += `<div class="kv-row" style="margin-top:4px"><span class="kv-label">Present</span><span class="kv-value">${t.present_count} / ${t.total_components}</span></div>`;
            }
            return h;
        }

        function renderPGSSTrace(t) {
            let h = '';
            if (t.clause_similarities && t.clause_similarities.length > 0) {
                h += `<div class="kv-row"><span class="kv-label">Policy Documents</span><span class="kv-value">${t.num_policy_docs || 0} chunks</span></div>`;
                h += `<div class="kv-row"><span class="kv-label">Similarity Threshold</span><span class="kv-value">≥ ${t.similarity_threshold}</span></div>`;
                h += `<div style="margin:8px 0 4px"><span class="kv-label">Clause Grounding:</span></div>`;
                h += `<table class="check-table"><tr><th>Clause</th><th>Max Similarity</th><th>Supported?</th></tr>`;
                for (const cs of t.clause_similarities) {
                    const cls = cs.supported ? 'tag-green' : 'tag-red';
                    const label = cs.supported ? '✓ Yes' : '✗ No';
                    const simColor = cs.max_similarity >= t.similarity_threshold ? 'score-green' : 'score-red';
                    h += `<tr><td>${esc(cs.clause)}</td><td class="${simColor}">${cs.max_similarity.toFixed(4)}</td><td><span class="tag ${cls}">${label}</span></td></tr>`;
                }
                h += `</table>`;
                h += `<div class="kv-row" style="margin-top:8px"><span class="kv-label">Supported Clauses</span><span class="kv-value">${t.supported_count} / ${t.total_clauses}</span></div>`;
            }
            return h;
        }

        function renderESITrace(t) {
            let h = '';
            h += `<div class="kv-row"><span class="kv-label">Explanation Runs</span><span class="kv-value">${t.num_explanations}</span></div>`;
            if (t.explanation_previews && t.explanation_previews.length > 0) {
                h += `<div style="margin:8px 0 4px"><span class="kv-label">Explanation Previews:</span></div>`;
                for (let i = 0; i < t.explanation_previews.length; i++) {
                    h += `<div style="font-size:11px;color:var(--text-muted);padding:4px 8px;margin-bottom:4px;background:var(--bg-code);border-radius:4px;border-left:2px solid var(--accent-cyan)">
                        <strong>Run ${i+1}:</strong> ${esc(t.explanation_previews[i])}...
                    </div>`;
                }
            }
            if (t.pairwise_distances && t.pairwise_distances.length > 0) {
                h += `<div style="margin:8px 0 4px"><span class="kv-label">Pairwise Cosine Distances:</span></div>`;
                h += `<table class="check-table"><tr><th>Pair</th><th>Cosine Distance</th></tr>`;
                for (const pd of t.pairwise_distances) {
                    h += `<tr><td>${pd.pair}</td><td>${pd.cosine_distance.toFixed(4)}</td></tr>`;
                }
                h += `</table>`;
                h += `<div class="kv-row" style="margin-top:8px"><span class="kv-label">Average Distance</span><span class="kv-value">${(t.average_distance||0).toFixed(4)}</span></div>`;
            }
            return h;
        }

        function renderEDRTrace(t) {
            let h = '';
            h += `<div class="kv-row"><span class="kv-label">Reasoning Tokens</span><span class="kv-value"><span class="tag tag-green">${t.reasoning_tokens}</span></span></div>`;
            h += `<div class="kv-row"><span class="kv-label">Filler Tokens</span><span class="kv-value"><span class="tag tag-red">${t.filler_tokens}</span></span></div>`;
            h += `<div class="kv-row"><span class="kv-label">Total Tokens</span><span class="kv-value">${t.total_tokens || (t.reasoning_tokens + t.filler_tokens)}</span></div>`;
            // Visual bar
            const total = (t.total_tokens || (t.reasoning_tokens + t.filler_tokens)) || 1;
            const rPct = (t.reasoning_tokens / total * 100).toFixed(1);
            const fPct = (t.filler_tokens / total * 100).toFixed(1);
            h += `<div style="margin-top:8px;height:20px;border-radius:4px;overflow:hidden;display:flex">
                <div style="width:${rPct}%;background:var(--accent-green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">${rPct}%</div>
                <div style="width:${fPct}%;background:var(--accent-red);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">${fPct}%</div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px">
                <span style="color:var(--accent-green)">Reasoning</span>
                <span style="color:var(--accent-red)">Filler</span>
            </div>`;
            return h;
        }

        // ── Render LLM call logs section ────────────────────────
        function renderLLMCallsSection(calls) {
            const secId = uid();
            let body = '';

            for (let i = 0; i < calls.length; i++) {
                const c = calls[i];
                const callId = uid();
                const statusCls = c.success ? 'tag-green' : 'tag-red';
                const statusLabel = c.success ? '✓' : '✗';

                body += `<div class="llm-call-card">
                    <div class="llm-call-header" onclick="toggleAccordion('${callId}')">
                        <span class="accordion-arrow" id="${callId}-arrow">▶</span>
                        <span class="llm-call-badge">Call #${i+1}</span>
                        <span class="tag ${statusCls}">${statusLabel}</span>
                        <span style="font-size:11px;color:var(--text-secondary)">${esc(c.model)}</span>
                        <span class="llm-call-time">${c.duration}s</span>
                    </div>
                    <div class="llm-call-body accordion-content" id="${callId}">
                        <div class="llm-io">
                            <div class="llm-io-label">📤 Prompt (truncated)</div>
                            <div class="llm-io-text">${esc(c.prompt || '')}</div>
                        </div>
                        <div class="llm-io">
                            <div class="llm-io-label">📥 Response</div>
                            <div class="llm-io-text">${esc(c.response || '')}</div>
                        </div>
                    </div>
                </div>`;
            }

            return `<div class="detail-section">
                <div class="detail-section-header" onclick="toggleAccordion('${secId}')">
                    <span class="accordion-arrow" id="${secId}-arrow">▶</span>
                    🔗 LLM Call Logs (${calls.length} calls)
                </div>
                <div class="accordion-content" id="${secId}">
                    <div class="detail-section-body">${body}</div>
                </div>
            </div>`;
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const arrow = document.getElementById(id + '-arrow');
            if (content) content.classList.toggle('open');
            if (arrow) arrow.classList.toggle('open');
        }
    </script>
</body>
</html>
